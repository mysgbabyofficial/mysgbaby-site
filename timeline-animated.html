<!DOCTYPE html>
<!--
  ANIMATED BABY-DEVELOPMENT TIMELINE — interactive demo. Open in any browser.
  Slide through the weeks (or press "Watch baby grow"): the baby grows inside a
  glowing womb with a pulsing heartbeat, floating bubbles, a filling progress
  ring, and a "size of a fruit" badge — transforming into a newborn at birth.
  Informational only, not medical advice.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mysgbaby — Watch baby grow (demo)</title>
  <link rel="icon" href="public/illustrations/emblem.webp" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@400;500;600&family=Caveat:wght@600&display=swap" rel="stylesheet" />
  <style>
    :root{ --ink:#38314f; --brand:#ef3340; --lav:#9a7be4; --lav7:#6a49bd; --gold:#f0c46a; }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:Inter,system-ui,sans-serif;color:var(--ink);overflow-x:hidden;
      background:radial-gradient(45% 55% at 12% 12%,#efe3ff 0,transparent 62%),
        radial-gradient(50% 55% at 90% 8%,#ffe8d6 0,transparent 60%),
        radial-gradient(55% 60% at 85% 92%,#ffdcec 0,transparent 60%),
        linear-gradient(180deg,#faf6ff,#fdf6fb);background-attachment:fixed}
    h1{font-family:Nunito;margin:0}
    header{display:flex;align-items:center;gap:10px;padding:16px 22px}
    header img{width:42px;height:42px}
    header .word{font-family:Nunito;font-weight:900;font-size:23px;color:var(--brand)}
    header .tag{margin-left:auto;font-family:Caveat;font-size:19px;color:var(--lav7)}
    main{max-width:760px;margin:0 auto;padding:6px 20px 40px;text-align:center}

    .viewer{position:relative;width:min(340px,80vw);aspect-ratio:1;margin:8px auto 6px}
    .ring{position:absolute;inset:0;transform:rotate(-90deg);z-index:3;pointer-events:none}
    .ring circle{fill:none;stroke-width:10;stroke-linecap:round}
    .ring .track{stroke:rgba(154,123,228,.18)}
    .ring .prog{stroke:url(#g);transition:stroke-dashoffset 1s ease}
    .glow{position:absolute;inset:8%;border-radius:50%;z-index:0;
      background:radial-gradient(circle,rgba(255,216,138,.55),rgba(247,168,198,.15) 60%,transparent 72%);
      animation:beat 1.6s ease-in-out infinite}
    @keyframes beat{0%,100%{transform:scale(1);opacity:.75}50%{transform:scale(1.06);opacity:1}}
    .frames{position:absolute;inset:6%;border-radius:50%;overflow:hidden;z-index:1;
      box-shadow:0 24px 60px -22px rgba(106,73,189,.6);transition:transform 1.1s cubic-bezier(.2,.7,.2,1)}
    .frames img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1.1s ease}
    .frames img.on{opacity:1}
    .bub{position:absolute;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.9),rgba(215,188,255,.3));
      z-index:2;opacity:.6;animation:rise linear infinite}
    @keyframes rise{0%{transform:translateY(0)}100%{transform:translateY(-140px)}}
    .confetti{position:fixed;top:-5%;width:10px;height:14px;z-index:20;animation:fall linear forwards}
    @keyframes fall{0%{transform:translateY(0) rotate(0)}100%{transform:translateY(110vh) rotate(540deg)}}

    .stage{font-family:Caveat;font-size:22px;color:var(--lav7)}
    #weeklabel{font-size:clamp(26px,4vw,40px);font-weight:900;margin:0 0 8px}
    .size{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid rgba(154,123,228,.3);
      border-radius:22px;padding:8px 16px;font-weight:700;box-shadow:0 10px 26px -14px rgba(106,73,189,.5)}
    .size .em{font-size:24px}
    #fact{color:#5a5372;max-width:460px;margin:12px auto 0}

    .controls{max-width:560px;margin:22px auto 0;background:rgba(255,255,255,.7);backdrop-filter:blur(8px);
      border-radius:22px;padding:18px 22px;box-shadow:0 16px 40px -20px rgba(80,50,140,.4)}
    input[type=range]{width:100%;accent-color:var(--lav)}
    .ticks{display:flex;justify-content:space-between;font-size:12px;color:#7a7192;margin-top:4px}
    .btn{margin-top:12px;border:0;border-radius:14px;padding:11px 22px;font-weight:700;font-family:inherit;cursor:pointer;font-size:15px;
      background:linear-gradient(135deg,var(--lav),var(--lav7));color:#fff;box-shadow:0 10px 24px -8px rgba(106,73,189,.7)}
    .disc{margin-top:16px;font-size:12px;color:#8a82a0}
    @media(prefers-reduced-motion:reduce){.glow,.bub{animation:none}}
  </style>
</head>
<body>
  <header>
    <img src="public/illustrations/emblem.webp" alt="mysgbaby" />
    <span class="word">mysgbaby</span>
    <span class="tag">Watch baby grow · demo</span>
  </header>

  <main>
    <div class="viewer" id="viewer">
      <svg class="ring" viewBox="0 0 340 340">
        <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#ffd98a"/><stop offset="1" stop-color="#f7a8c6"/></linearGradient></defs>
        <circle class="track" cx="170" cy="170" r="160"/>
        <circle class="prog" cx="170" cy="170" r="160" id="prog"/>
      </svg>
      <div class="glow"></div>
      <div class="frames" id="frames">
        <img id="fr0" src="public/illustrations/dev1.webp" alt="" class="on" />
        <img id="fr1" src="public/illustrations/dev4.webp" alt="" />
        <img id="fr2" src="public/illustrations/dev5.webp" alt="" />
        <img id="fr3" src="public/illustrations/dev6.webp" alt="" />
      </div>
      <div id="bubbles"></div>
    </div>

    <div class="stage" id="stage"></div>
    <h1 id="weeklabel"></h1>
    <div class="size" id="size"></div>
    <p id="fact"></p>

    <div class="controls">
      <input type="range" id="slider" min="4" max="52" value="8" />
      <div class="ticks"><span>Week 4</span><span>Week 20</span><span>Birth</span><span>Baby!</span></div>
      <button class="btn" id="play">▶ Watch baby grow</button>
    </div>
    <p class="disc">Illustrative development &amp; fruit sizes are a friendly guide, not medical measurements. Every baby grows at their own pace.</p>
  </main>

  <script>
    const frames=[...document.querySelectorAll('.frames img')];
    const prog=document.getElementById('prog');
    const framesEl=document.getElementById('frames');
    const stage=document.getElementById('stage');
    const weeklabel=document.getElementById('weeklabel');
    const sizeEl=document.getElementById('size');
    const fact=document.getElementById('fact');
    const slider=document.getElementById('slider');
    const bubbles=document.getElementById('bubbles');
    const C=2*Math.PI*160; prog.style.strokeDasharray=C;
    let prevBorn=false;

    const SIZES=[[4,'🌱','a poppy seed'],[6,'🫛','a sweet pea'],[8,'🍓','a raspberry'],[10,'🍓','a strawberry'],
      [12,'🍋','a lime'],[14,'🍋','a lemon'],[16,'🥑','an avocado'],[18,'🫑','a bell pepper'],[20,'🍌','a banana'],
      [22,'🫐','a papaya'],[24,'🌽','a corn cob'],[26,'🥬','a head of lettuce'],[28,'🍆','an eggplant'],
      [30,'🥬','a cabbage'],[32,'🎃','a squash'],[34,'🍍','a pineapple'],[36,'🍈','a honeydew melon'],
      [38,'🍈','a winter melon'],[40,'🍉','a watermelon']];
    function sizeFor(w){ let s=SIZES[0]; for(const x of SIZES){ if(w>=x[0]) s=x; } return s; }

    for(let i=0;i<10;i++){ const b=document.createElement('div'); b.className='bub';
      const s=8+Math.floor(Math.random()*18); b.style.width=s+'px'; b.style.height=s+'px';
      b.style.left=(10+Math.random()*80)+'%'; b.style.bottom='6%';
      b.style.animationDuration=(4+Math.random()*4)+'s'; b.style.animationDelay=(-Math.random()*6)+'s';
      bubbles.appendChild(b); }

    function confetti(){ const cs=['#ffd98a','#f7a8c6','#9a7be4','#a9d6be','#ef3340'];
      for(let i=0;i<50;i++){ const c=document.createElement('div'); c.className='confetti';
        c.style.left=Math.random()*100+'%'; c.style.background=cs[i%cs.length];
        c.style.animationDuration=(2.4+Math.random()*2)+'s'; c.style.animationDelay=(Math.random()*.6)+'s';
        document.body.appendChild(c); setTimeout(()=>c.remove(),5000);} }

    function frameIndex(w,born){ if(born) return 3; if(w>=27) return 2; if(w>=14) return 1; return 0; }

    function render(w){
      const born=w>40;
      const idx=frameIndex(w,born);
      frames.forEach((f,i)=> f.classList.toggle('on', i===idx));
      const scale= born ? 1 : (0.8 + 0.2*Math.min(w,40)/40);
      framesEl.style.transform=`scale(${scale})`;
      prog.style.strokeDashoffset = C*(1 - Math.min(w,40)/40);

      if(born){
        stage.textContent="Your baby is here! 🍼";
        weeklabel.textContent="🎉 Welcome to the world!";
        sizeEl.innerHTML='<span class="em">🍼</span> Perfectly sized — your baby!';
        fact.textContent="Congratulations — the beginning of a whole new adventure.";
      } else {
        const st = w<=13?"First Trimester":w<=27?"Second Trimester":"Third Trimester";
        const s=sizeFor(w);
        stage.textContent="🌙 "+st;
        weeklabel.textContent="Week "+w;
        sizeEl.innerHTML=`<span class="em">${s[1]}</span> About the size of ${s[2]}`;
        fact.textContent = w>=27 ? "Getting cozy and gaining weight, almost ready to meet you."
          : w>=14 ? "You might feel the first kicks — and baby can hear your voice."
          : "Tiny but busy — the heart is beating and little features are forming.";
      }
      if(born && !prevBorn) confetti();
      prevBorn=born;
    }

    slider.addEventListener('input', ()=> render(+slider.value));
    render(+slider.value);
    document.getElementById('play').addEventListener('click', ()=>{
      let w=5; slider.value=w; render(w);
      const id=setInterval(()=>{ w+=1; if(w>44){clearInterval(id);return;} slider.value=w; render(w); }, 130);
    });
  </script>
</body>
</html>
