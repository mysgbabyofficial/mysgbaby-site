<!DOCTYPE html>
<!--
  INTERACTIVE STAGE EXPLORER — demo. Open in any browser to click through the
  drill-down experience. This is a design/UX prototype; once approved it gets
  ported into the Next.js app (as a <StageExplorer> component + data file).
  Content is informational only, not medical advice; prices are indicative.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />

  <title>mysgbaby — Interactive Guide (demo)</title>

  <style>

    *{box-sizing:border-box}
    body{margin:0;color:var(--ink);font-family:Inter,system-ui,sans-serif;font-size:16px;line-height:1.6;

    h1,h2,h3{font-family:Nunito,sans-serif;margin:0 0 .3em}
    .wrap{max-width:820px;margin:0 auto;padding:20px}
    header{display:flex;align-items:center;gap:10px;padding:6px 0 14px}
    header img{width:42px;height:42px}
    header .word{font-family:Nunito;font-weight:900;font-size:23px;color:var(--brand)}
    header .tag{margin-left:auto;font-family:Caveat;font-size:19px;color:var(--lav-500)}
    .disclaimer{background:#eaf1fb;border:1px solid #a7c0e6;border-radius:12px;padding:10px 13px;font-size:12.5px;color:var(--ink);margin-bottom:14px}
    .crumbs{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:13px;margin-bottom:12px}
    .crumbs button{border:0;background:var(--lav-100);color:var(--lav-700);font-weight:600;padding:4px 10px;border-radius:20px;cursor:pointer;font-family:inherit}
    .crumbs .sep{color:var(--muted)}
    .crumbs .cur{color:var(--muted);padding:4px 2px}
    .card{background:var(--card);border-radius:24px;box-shadow:var(--shadow);border:1px solid rgba(154,123,228,.12);overflow:hidden;animation:pop .35s cubic-bezier(.2,.7,.2,1)}
    @keyframes pop{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    .celebrate{background:linear-gradient(135deg,#ffe6a8,#ffc2d3);padding:16px 22px;font-family:Nunito;font-weight:800;font-size:18px;color:#7a3b52}
    .hero-illus{width:100%;max-height:230px;object-fit:cover;display:block}
    .pad{padding:22px}
    .back{display:inline-flex;align-items:center;gap:6px;border:0;background:transparent;color:var(--lav-700);font-weight:700;cursor:pointer;font-family:inherit;font-size:14px;margin-bottom:8px}
    h2.title{font-size:clamp(22px,3vw,28px)}
    .intro{color:var(--muted);margin-top:-2px}
    .body p{margin:.7em 0}
    .tip{background:#fff7e6;border:1px solid var(--gold);border-radius:12px;padding:11px 14px;font-size:14px;margin:14px 0}
    .tip b{color:#8a5a12}
    table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13.5px}
    caption{caption-side:top;text-align:left;font-weight:700;font-family:Nunito;margin-bottom:6px}
    th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--lav-100);vertical-align:top}
    th{background:var(--lav-100);color:var(--lav-700);font-size:12px;text-transform:uppercase;letter-spacing:.3px}
    .price{font-weight:700;color:var(--lav-700);white-space:nowrap}
    .tnote{font-size:12px;color:var(--muted);margin-top:-6px}
    .sources{background:#f4fbf7;border:1px solid #bfe6cf;border-radius:12px;padding:11px 14px;font-size:13px;margin:14px 0}
    .sources b{color:#1c5c3d}
    .sources a{color:#1c5c3d}
    .opts{display:grid;gap:11px;margin-top:16px}
    .opt{display:flex;align-items:center;gap:14px;text-align:left;width:100%;border:1px solid var(--lav-300);background:linear-gradient(135deg,#fff,#faf6ff);
      border-radius:16px;padding:14px 16px;cursor:pointer;transition:.18s;font-family:inherit}
    .opt:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--lav-500)}
    .opt .em{font-size:26px;flex-shrink:0}
    .opt .lbl{font-family:Nunito;font-weight:800;font-size:16px;color:var(--ink)}
    .opt .hint{font-size:13px;color:var(--muted)}
    .opt .chev{margin-left:auto;color:var(--lav-500);font-size:20px;flex-shrink:0}
    .opt.cta{background:linear-gradient(135deg,var(--lav-500),var(--lav-700));border:0}
    .opt.cta .lbl,.opt.cta .hint,.opt.cta .chev{color:#fff}
    .foot{font-size:12px;color:var(--muted);padding:14px 22px;border-top:1px solid var(--lav-100)}
  </style>
</head>

  // ---- engine ----
  let stack = ['home'];

  function crumbLabel(id){ return NODES[id].title.replace(/\s*\(.*$/,''); }

  function render(){
    const id = stack[stack.length-1];
    const n = NODES[id];
    // breadcrumbs
    const cb = document.getElementById('crumbs');
    cb.innerHTML = stack.map((sid,i)=>{
      if(i===stack.length-1) return `<span class="cur">${crumbLabel(sid)}</span>`;
      return `<button data-i="${i}">${crumbLabel(sid)}</button><span class="sep">›</span>`;
    }).join('');
    cb.querySelectorAll('button').forEach(b=>b.onclick=()=>{ stack=stack.slice(0,+b.dataset.i+1); render(); });

    let h = '<div class="card">';
    if(n.celebrate) h += `<div class="celebrate">${n.celebrate}</div>`;
    if(n.illustration) h += `<img class="hero-illus" src="${n.illustration}" alt="" />`;
    h += '<div class="pad">';
    if(stack.length>1) h += `<button class="back" id="backBtn">‹ Back</button>`;
    h += `<h2 class="title">${n.title}</h2>`;
    if(n.intro) h += `<p class="intro">${n.intro}</p>`;
    if(n.body) h += `<div class="body">${n.body.map(p=>`<p>${p}</p>`).join('')}</div>`;
    if(n.priceTable){
      const t=n.priceTable;
      h += `<table><caption>${t.caption}</caption><tr><th>Item</th><th>Where to buy</th><th>Price</th><th>Notes</th></tr>`;
      h += t.rows.map(r=>`<tr><td><b>${r.item}</b></td><td>${r.where}</td><td class="price">${r.price}</td><td>${r.notes}</td></tr>`).join('');
      h += `</table>`;
      if(t.note) h += `<p class="tnote">${t.note}</p>`;
    }
    if(n.tip) h += `<div class="tip">💡 ${n.tip}</div>`;
    if(n.sources) h += `<div class="sources"><b>Official sources:</b> ${n.sources.map(s=>`<a href="${s.url}" target="_blank" rel="noopener">${s.label}</a>`).join(' · ')}</div>`;
    if(n.options){
      h += '<div class="opts">';
      h += n.options.map((o,i)=>`<button class="opt ${o.cta?'cta':''}" data-to="${o.to}">
        <span class="em">${o.em}</span>
        <span><span class="lbl">${o.label}</span><br><span class="hint">${o.hint||''}</span></span>
        <span class="chev">›</span></button>`).join('');
      h += '</div>';
    }
    h += '</div><div class="foot">Informational only, not medical advice · prices indicative · confirm with your healthcare provider.</div></div>';
    const v = document.getElementById('view');
    v.innerHTML = h;
    const bb = document.getElementById('backBtn'); if(bb) bb.onclick=()=>{ stack.pop(); render(); };
    v.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{ stack.push(b.dataset.to); render(); window.scrollTo({top:0,behavior:'smooth'}); });
  }
  const _sp = new URLSearchParams(location.search).get('start');
  if(_sp && NODES[_sp]) stack = ['home', _sp];
  render();
  </script>
